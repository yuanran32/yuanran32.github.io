name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支就自动部署
  push:
    branches: main

# 允许 GitHub 操作仓库权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm install

      - name: 构建 Astro
        run: npm run build

      - name: 上传静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4